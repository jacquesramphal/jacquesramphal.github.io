<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Editorial Filters — POC</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: #141414;
      --text: #e0e0e0;
      --muted: #555;
      --accent: #ff3322;
      --border: #222;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      min-height: 100vh;
      padding: 2rem 1.25rem 5rem;
    }

    header {
      max-width: 960px;
      margin: 0 auto 2rem;
      display: flex;
      align-items: baseline;
      gap: 1.5rem;
    }

    h1 {
      font-size: 0.8rem;
      font-weight: 400;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text);
    }

    header p {
      font-size: 0.65rem;
      letter-spacing: 0.05em;
      color: var(--muted);
      font-family: 'Courier New', monospace;
    }

    .layout {
      max-width: 960px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr 220px;
      gap: 2.5rem;
      align-items: start;
    }

    @media (max-width: 600px) {
      .layout { grid-template-columns: 1fr; }
    }

    /* Stage */
    .stage {
      position: relative;
      background: #111;
      overflow: hidden;
      aspect-ratio: 2 / 3;
    }

    .stage img,
    .stage canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .stage canvas { display: none; }

    .effect-label {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 2rem 1rem 0.75rem;
      font-family: 'Courier New', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.5);
      background: linear-gradient(to top, rgba(0,0,0,0.7) 0%, transparent 100%);
      pointer-events: none;
    }

    /* Sidebar */
    .sidebar {
      display: flex;
      flex-direction: column;
      gap: 1.75rem;
      padding-top: 0.25rem;
    }

    .group-label {
      font-size: 0.55rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.6rem;
      padding-bottom: 0.4rem;
      border-bottom: 1px solid var(--border);
      font-family: 'Courier New', monospace;
    }

    .btn-group {
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    button {
      background: transparent;
      border: none;
      color: var(--muted);
      font-family: 'Courier New', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.08em;
      text-align: left;
      padding: 0.45rem 0.6rem;
      cursor: pointer;
      text-transform: uppercase;
      border-left: 2px solid transparent;
      transition: color 0.1s, border-color 0.1s;
    }

    button:hover { color: var(--text); }

    button.active {
      color: #fff;
      border-left-color: var(--accent);
    }

    /* Note for canvas-blocked state */
    .canvas-note {
      font-size: 0.6rem;
      font-family: 'Courier New', monospace;
      color: var(--muted);
      margin-top: 0.5rem;
      line-height: 1.5;
      display: none;
    }

    /* ─── CSS Filter Classes ─── */

    #subject.bw        { filter: grayscale(1); }
    #subject.sepia     { filter: sepia(0.85) brightness(1.05); }
    #subject.hicon     { filter: grayscale(1) contrast(2.4) brightness(0.82); }
    #subject.bleach    { filter: saturate(0.1) contrast(2.0) brightness(1.08); }
    #subject.xpro      { filter: hue-rotate(28deg) saturate(3.0) contrast(1.4) brightness(0.82); }
    #subject.lith      { filter: sepia(0.65) contrast(2.8) brightness(1.05) saturate(0.6); }
    #subject.cyanotype { filter: grayscale(1) sepia(1) hue-rotate(175deg) saturate(7) brightness(0.65); }
    #subject.duo1      { filter: url(#f-duo1); }
    #subject.duo2      { filter: url(#f-duo2); }
    #subject.infrared  { filter: url(#f-infrared); }
    #subject.solarize  { filter: url(#f-solarize); }
  </style>
</head>
<body>

<header>
  <h1>Editorial Filters</h1>
  <p>CSS · SVG · Canvas — zero deps</p>
</header>

<div class="layout">

  <div class="stage" id="stage">
    <img id="subject" src="portrait.jpg" alt="Subject" crossorigin="anonymous">
    <canvas id="canvas"></canvas>
    <div class="effect-label" id="label">Original</div>
  </div>

  <div class="sidebar">

    <div>
      <div class="group-label">Simple</div>
      <div class="btn-group">
        <button class="active" data-effect="none"     data-label="Original">None</button>
        <button data-effect="bw"       data-label="B&amp;W">B&amp;W</button>
        <button data-effect="sepia"    data-label="Sepia">Sepia</button>
        <button data-effect="hicon"    data-label="Hi-Con B&amp;W">Hi-Con B&amp;W</button>
      </div>
    </div>

    <div>
      <div class="group-label">Editorial — CSS</div>
      <div class="btn-group">
        <button data-effect="bleach"    data-label="Bleach Bypass">Bleach Bypass</button>
        <button data-effect="xpro"      data-label="Cross-Process">Cross-Process</button>
        <button data-effect="lith"      data-label="Lith Print">Lith Print</button>
        <button data-effect="cyanotype" data-label="Cyanotype">Cyanotype</button>
      </div>
    </div>

    <div>
      <div class="group-label">Editorial — SVG</div>
      <div class="btn-group">
        <button data-effect="duo1"      data-label="Duotone  Navy / Coral">Duotone I</button>
        <button data-effect="duo2"      data-label="Duotone  Violet / Lime">Duotone II</button>
        <button data-effect="infrared"  data-label="Infrared">Infrared</button>
        <button data-effect="solarize"  data-label="Solarization">Solarization</button>
      </div>
    </div>

    <div>
      <div class="group-label">Pixel Ops — Canvas</div>
      <div class="btn-group">
        <button data-effect="thermal"  data-label="Thermal / False Color"  data-canvas="1">Thermal</button>
        <button data-effect="halftone" data-label="Halftone"               data-canvas="1">Halftone</button>
        <button data-effect="chroma"   data-label="Chromatic Aberration"   data-canvas="1">Chromatic Abbr.</button>
      </div>
      <p class="canvas-note" id="canvas-note">
        Canvas pixel ops are blocked on file://<br>
        Open via a local server to enable.
      </p>
    </div>

  </div>
</div>

<!-- ─── SVG Filter Definitions ─── -->
<svg style="display:none" xmlns="http://www.w3.org/2000/svg">
  <defs>

    <!-- Duotone I: deep navy → coral -->
    <filter id="f-duo1" color-interpolation-filters="sRGB">
      <feColorMatrix type="matrix" values="
        0.2126 0.7152 0.0722 0 0
        0.2126 0.7152 0.0722 0 0
        0.2126 0.7152 0.0722 0 0
        0      0      0      1 0"/>
      <feComponentTransfer>
        <feFuncR type="table" tableValues="0.04 1.00"/>
        <feFuncG type="table" tableValues="0.04 0.27"/>
        <feFuncB type="table" tableValues="0.28 0.38"/>
      </feComponentTransfer>
    </filter>

    <!-- Duotone II: deep violet → electric lime -->
    <filter id="f-duo2" color-interpolation-filters="sRGB">
      <feColorMatrix type="matrix" values="
        0.2126 0.7152 0.0722 0 0
        0.2126 0.7152 0.0722 0 0
        0.2126 0.7152 0.0722 0 0
        0      0      0      1 0"/>
      <feComponentTransfer>
        <feFuncR type="table" tableValues="0.22 0.70"/>
        <feFuncG type="table" tableValues="0.00 0.96"/>
        <feFuncB type="table" tableValues="0.32 0.06"/>
      </feComponentTransfer>
    </filter>

    <!-- Infrared: channel mix — greens → white, reds → dark, eerie sky -->
    <filter id="f-infrared" color-interpolation-filters="sRGB">
      <feColorMatrix type="matrix" values="
         0.0  1.0  0.0  0   0.04
         0.0  0.9  0.1  0   0
         0.6  0.1  0.3  0  -0.08
         0    0    0    1   0"/>
      <feComponentTransfer>
        <feFuncR type="gamma" amplitude="1.1" exponent="0.7" offset="0"/>
        <feFuncG type="gamma" amplitude="1.0" exponent="0.8" offset="0"/>
        <feFuncB type="gamma" amplitude="0.9" exponent="1.3" offset="-0.04"/>
      </feComponentTransfer>
    </filter>

    <!-- Solarization: V-curve partial inversion (Man Ray / Sabattier) -->
    <filter id="f-solarize" color-interpolation-filters="sRGB">
      <feComponentTransfer>
        <feFuncR type="table" tableValues="0 0.5 1 0.5 0"/>
        <feFuncG type="table" tableValues="0 0.5 1 0.5 0"/>
        <feFuncB type="table" tableValues="0 0.5 1 0.5 0"/>
      </feComponentTransfer>
    </filter>

  </defs>
</svg>

<script>
  const subject = document.getElementById('subject');
  const canvas  = document.getElementById('canvas');
  const ctx     = canvas.getContext('2d');
  const label   = document.getElementById('label');
  const note    = document.getElementById('canvas-note');
  const stage   = document.getElementById('stage');

  const CANVAS_FX = new Set(['thermal', 'halftone', 'chroma']);

  // Thermal color ramp: black → deep red → orange → neon yellow → near white
  const THERMAL = [
    [  0,   0,   0],
    [ 90,   0,   0],
    [200,  30,   0],
    [255, 130,   0],
    [255, 230,   0],
    [255, 255, 180],
  ];

  function lerp(a, b, t) { return a + (b - a) * t; }

  function rampColor(luma, ramp) {
    const t = (luma / 255) * (ramp.length - 1);
    const i = Math.min(Math.floor(t), ramp.length - 2);
    const f = t - i;
    return [
      Math.round(lerp(ramp[i][0], ramp[i + 1][0], f)),
      Math.round(lerp(ramp[i][1], ramp[i + 1][1], f)),
      Math.round(lerp(ramp[i][2], ramp[i + 1][2], f)),
    ];
  }

  // Draw image to canvas respecting object-fit: cover geometry
  function drawCover(targetCtx, img) {
    const W = stage.offsetWidth;
    const H = stage.offsetHeight;
    targetCtx.canvas.width  = W;
    targetCtx.canvas.height = H;
    const iW = img.naturalWidth;
    const iH = img.naturalHeight;
    const scale = Math.max(W / iW, H / iH);
    const sw = W / scale;
    const sh = H / scale;
    const sx = (iW - sw) / 2;
    const sy = (iH - sh) / 2;
    targetCtx.drawImage(img, sx, sy, sw, sh, 0, 0, W, H);
  }

  function applyThermal() {
    drawCover(ctx, subject);
    const d = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const px = d.data;
    for (let i = 0; i < px.length; i += 4) {
      const luma = 0.299 * px[i] + 0.587 * px[i + 1] + 0.114 * px[i + 2];
      const [r, g, b] = rampColor(luma, THERMAL);
      px[i] = r; px[i + 1] = g; px[i + 2] = b;
    }
    ctx.putImageData(d, 0, 0);
  }

  function applyHalftone() {
    const cell = Math.max(4, Math.round(stage.offsetWidth / 80));

    // Read pixels from offscreen to avoid taint before drawing halftone
    const off = Object.assign(document.createElement('canvas'), {
      width: stage.offsetWidth, height: stage.offsetHeight
    });
    drawCover(off.getContext('2d'), subject);
    const src = off.getContext('2d').getImageData(0, 0, off.width, off.height).data;

    canvas.width  = off.width;
    canvas.height = off.height;

    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#fff';

    for (let y = 0; y < canvas.height; y += cell) {
      for (let x = 0; x < canvas.width; x += cell) {
        const cx  = x + cell / 2;
        const cy  = y + cell / 2;
        const idx = (Math.floor(cy) * canvas.width + Math.floor(cx)) * 4;
        const luma = 0.299 * src[idx] + 0.587 * src[idx + 1] + 0.114 * src[idx + 2];
        const r = (luma / 255) * (cell / 2) * 0.9;
        if (r < 0.4) continue;
        ctx.beginPath();
        ctx.arc(cx, cy, r, 0, Math.PI * 2);
        ctx.fill();
      }
    }
  }

  function applyChroma() {
    const shift = Math.round(stage.offsetWidth * 0.022);
    const W = stage.offsetWidth;
    const H = stage.offsetHeight;

    // Capture original pixels
    const off = Object.assign(document.createElement('canvas'), { width: W, height: H });
    drawCover(off.getContext('2d'), subject);
    const orig = off.getContext('2d').getImageData(0, 0, W, H).data;

    // Capture right-shifted pixels (for red channel)
    const offR = Object.assign(document.createElement('canvas'), { width: W, height: H });
    const octxR = offR.getContext('2d');
    octxR.drawImage(off, shift, 0);
    const shifted = octxR.getImageData(0, 0, W, H).data;

    // Capture left-shifted pixels (for blue channel)
    const offB = Object.assign(document.createElement('canvas'), { width: W, height: H });
    const octxB = offB.getContext('2d');
    octxB.drawImage(off, -shift, 0);
    const shiftedB = octxB.getImageData(0, 0, W, H).data;

    canvas.width  = W;
    canvas.height = H;
    const out = ctx.createImageData(W, H);
    const d   = out.data;

    for (let i = 0; i < orig.length; i += 4) {
      d[i]     = shifted[i];      // R — shifted right
      d[i + 1] = orig[i + 1];    // G — original
      d[i + 2] = shiftedB[i + 2];// B — shifted left
      d[i + 3] = 255;
    }
    ctx.putImageData(out, 0, 0);
  }

  function showCanvasBlocked() {
    const W = stage.offsetWidth;
    const H = stage.offsetHeight;
    canvas.width  = W;
    canvas.height = H;
    ctx.fillStyle = '#111';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#444';
    const fs = Math.round(W * 0.025);
    ctx.font = `${fs}px 'Courier New', monospace`;
    ctx.fillText('Canvas blocked on file://', W * 0.06, H * 0.48);
    ctx.fillText('Run via: npm run serve', W * 0.06, H * 0.48 + fs * 1.8);
    note.style.display = 'block';
  }

  function runCanvasFx(effect) {
    try {
      if (effect === 'thermal')  applyThermal();
      if (effect === 'halftone') applyHalftone();
      if (effect === 'chroma')   applyChroma();
    } catch (e) {
      showCanvasBlocked();
    }
  }

  function setEffect(effect, labelText) {
    subject.className = '';
    subject.style.display = 'block';
    canvas.style.display  = 'none';
    note.style.display    = 'none';
    label.textContent     = labelText;

    if (CANVAS_FX.has(effect)) {
      subject.style.display = 'none';
      canvas.style.display  = 'block';
      if (subject.complete && subject.naturalWidth > 0) {
        runCanvasFx(effect);
      } else {
        subject.addEventListener('load', () => runCanvasFx(effect), { once: true });
      }
      return;
    }

    if (effect !== 'none') subject.classList.add(effect);
  }

  document.querySelectorAll('button[data-effect]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('button[data-effect]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      setEffect(btn.dataset.effect, btn.dataset.label);
    });
  });
</script>

</body>
</html>
