<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>counter-fill · CodeSandbox</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,900;1,900&family=Bebas+Neue&family=Abril+Fatface&family=Oswald:wght@700&family=Yeseva+One&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

body {
background: #0e0e0e;
padding: 60px 32px;
display: flex;
flex-direction: column;
align-items: center;
gap: 64px;
}

.wrap {
position: relative;
display: inline-block;
line-height: 1;
white-space: nowrap;
}

.wrap canvas {
position: absolute;
top: 0; left: 0;
width: 100%; height: 100%;
pointer-events: none;
z-index: 0;
}
.wrap .text {
position: relative;
z-index: 1;
}

.wrap-multi {
position: relative;
display: block;
line-height: 1.2;
text-align: center;
}
.wrap-multi .cf-word {
position: relative;
z-index: 1;
display: inline-block;
}

.w1 .text { font-family:'Playfair Display',serif; font-size:clamp(64px,16vw,150px); font-weight:900; color:#f0ece4; }
.w2 .text { font-family:'Bebas Neue',sans-serif;  font-size:clamp(72px,20vw,180px); color:#e8e8e8; letter-spacing:.04em; }
.w3 .text { font-family:'Abril Fatface',serif;    font-size:clamp(60px,15vw,140px); color:#fdf6e3; }
.w4 .text { font-family:'Playfair Display',serif; font-size:clamp(56px,14vw,130px); font-weight:900; font-style:italic; color:#e8ddd0; }
.w5 .text { font-family:'Yeseva One',serif;       font-size:clamp(60px,15vw,140px); color:#f5f0eb; }
.w6 .text { font-family:'Oswald',sans-serif;      font-size:clamp(64px,17vw,160px); font-weight:700; color:#ddeeff; letter-spacing:.04em; }
.w7 .text { font-family:'Abril Fatface',serif;    font-size:clamp(56px,14vw,130px); color:#fff0f5; }

.wm { font-family:'Playfair Display',serif; font-size:clamp(48px,11vw,110px); font-weight:900; color:#f0ece4; max-width:min(680px,88vw); }
</style>
</head>
<body>

  <div class="wrap w1" id="w1"><canvas></canvas><span class="text">Golden</span></div>
  <div class="wrap w2" id="w2"><canvas></canvas><span class="text">Typeface</span></div>
  <div class="wrap w3" id="w3"><canvas></canvas><span class="text">Aperture</span></div>
  <div class="wrap w4" id="w4"><canvas></canvas><span class="text">Obsidian</span></div>
  <div class="wrap w5" id="w5"><canvas></canvas><span class="text">Phantom</span></div>
  <div class="wrap w6" id="w6"><canvas></canvas><span class="text">Exposure</span></div>
  <div class="wrap w7" id="w7"><canvas></canvas><span class="text">Baroque</span></div>

  <div class="wrap-multi wm" id="wm">Golden Baroque Obsidian Aperture</div>

<script>
const FILLS = {
  w1: { stops: ['#f5c842','#d4820a','#7a3a08'] },
  w2: { stops: ['#ff6060','#c01020','#600010'] },
  w3: { stops: ['#e05c5c','#a01830','#4a0010'] },
  w4: { stops: ['#c0a8ff','#6030c0','#200860'] },
  w5: { stops: ['#40ffb0','#10a060','#004030'] },
  w6: { stops: ['#ffe040','#e08000','#804000'] },
  w7: { stops: ['#60e0a0','#108050','#003020'] },
  wm: { stops: ['#f5c842','#d4820a','#7a3a08'] },
};

const _colorEl = document.createElement('div');
_colorEl.style.cssText = 'position:absolute;width:0;height:0;overflow:hidden;';
document.body.appendChild(_colorEl);

function resolveColor(color) {
  if (!color.includes('var(')) return color;
  _colorEl.style.color = color;
  return getComputedStyle(_colorEl).color;
}

function bfsAndPaint(cv, ctx, pw, ph, stops) {
  const img = ctx.getImageData(0, 0, pw, ph);
  const d   = img.data;
  const N   = pw * ph;

  const outside = new Uint8Array(N);
  const q = [];
  const enq = i => {
    if (i < 0 || i >= N || outside[i] || d[i*4+3] > 32) return;
    outside[i] = 1; q.push(i);
  };
  for (let x = 0; x < pw; x++) { enq(x); enq((ph-1)*pw+x); }
  for (let y = 0; y < ph; y++) { enq(y*pw); enq(y*pw+pw-1); }
  while (q.length) {
    const i = q.pop();
    enq(i-1); enq(i+1); enq(i-pw); enq(i+pw);
  }

  const counter = new Uint8Array(N);
  for (let i = 0; i < N; i++)
    if (d[i*4+3] === 0 && !outside[i]) counter[i] = 1;

  // Filter wide flat strips (inter-line gaps). Width check removed: per-word
  // canvases are narrow enough that real counters can exceed any fixed % of width.
  const regionSeen = new Uint8Array(N);
  for (let i = 0; i < N; i++) {
    if (!counter[i] || regionSeen[i]) continue;
    const region = [];
    let minX = pw, maxX = 0, minY = ph, maxY = 0;
    const rq = [i];
    regionSeen[i] = 1;
    while (rq.length) {
      const ri = rq.pop();
      region.push(ri);
      const rx = ri % pw;
      const ry = (ri / pw) | 0;
      if (rx < minX) minX = rx;
      if (rx > maxX) maxX = rx;
      if (ry < minY) minY = ry;
      if (ry > maxY) maxY = ry;
      for (const ni of [ri-1, ri+1, ri-pw, ri+pw]) {
        if (ni >= 0 && ni < N && counter[ni] && !regionSeen[ni]) {
          regionSeen[ni] = 1; rq.push(ni);
        }
      }
    }
    const rw = maxX - minX;
    const rh = maxY - minY;
    if (rh > 0 && rw / rh > 4) {
      for (const ri of region) counter[ri] = 0;
    }
  }

  const DILATE = 2;
  const dilated = new Uint8Array(N);
  for (let y = 0; y < ph; y++)
    for (let x = 0; x < pw; x++) {
      if (!counter[y*pw+x]) continue;
      for (let dy = -DILATE; dy <= DILATE; dy++)
        for (let dx = -DILATE; dx <= DILATE; dx++) {
          const nx = x+dx, ny = y+dy;
          if (nx>=0 && nx<pw && ny>=0 && ny<ph) dilated[ny*pw+nx] = 1;
        }
    }

  const mask = new ImageData(pw, ph);
  for (let i = 0; i < N; i++) {
    mask.data[i*4+0] = 255;
    mask.data[i*4+1] = 255;
    mask.data[i*4+2] = 255;
    mask.data[i*4+3] = dilated[i] ? 255 : 0;
  }

  ctx.clearRect(0, 0, pw, ph);
  ctx.putImageData(mask, 0, 0);
  ctx.globalCompositeOperation = 'source-atop';

  const resolved = stops.map(resolveColor);
  let fill;
  if (resolved.length === 1) {
    fill = resolved[0];
  } else {
    const cx = pw*0.5, cy = ph*0.48, r = pw*0.6;
    const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
    resolved.forEach((c, i) => g.addColorStop(i / (resolved.length - 1), c));
    fill = g;
  }
  ctx.fillStyle = fill;
  ctx.fillRect(0, 0, pw, ph);
  ctx.globalCompositeOperation = 'source-over';
}

function paintWrap(wrap) {
  const cv     = wrap.querySelector('canvas');
  const textEl = wrap.querySelector('.text');
  const fill   = FILLS[wrap.id];
  if (!cv || !textEl || !fill) return;

  const dpr = window.devicePixelRatio || 1;
  const cs  = getComputedStyle(textEl);
  const fontStr = [
    cs.fontStyle !== 'normal' ? cs.fontStyle : '',
    cs.fontWeight, cs.fontSize, cs.fontFamily,
  ].filter(Boolean).join(' ');
  const word = textEl.textContent.trim();

  const mc = document.createElement('canvas');
  const mx = mc.getContext('2d');
  mx.font  = fontStr;
  const m      = mx.measureText(word);
  const ascent = m.actualBoundingBoxAscent;

  const sizer = document.createElement('span');
  sizer.style.cssText = 'display:inline-block;width:0;height:0;vertical-align:baseline;overflow:visible;';
  wrap.insertBefore(sizer, textEl);
  const wR = wrap.getBoundingClientRect();
  const sR = sizer.getBoundingClientRect();
  wrap.removeChild(sizer);
  const baselineY = sR.bottom - wR.top;
  const baselineX = sR.left   - wR.left;

  const W = wrap.offsetWidth, H = wrap.offsetHeight;
  cv.width  = Math.round(W * dpr);
  cv.height = Math.round(H * dpr);
  const ctx = cv.getContext('2d', { willReadFrequently: true });
  ctx.scale(dpr, dpr);

  // Drift correction on a small probe canvas — avoids a second getImageData
  // on the full-size main canvas (GPU→CPU readback is expensive).
  const probe = document.createElement('canvas');
  probe.width  = cv.width;
  probe.height = cv.height;
  const pCtx  = probe.getContext('2d', { willReadFrequently: true });
  pCtx.scale(dpr, dpr);
  pCtx.font          = fontStr;
  pCtx.letterSpacing = cs.letterSpacing || '0px';
  pCtx.textBaseline  = 'alphabetic';
  pCtx.fillStyle     = '#fff';
  pCtx.fillText(word, baselineX, baselineY);

  const td = pCtx.getImageData(0, 0, probe.width, probe.height).data;
  let inkTop = probe.height;
  outer: for (let r = 0; r < probe.height; r++)
    for (let c = 0; c < probe.width; c++)
      if (td[(r*probe.width+c)*4+3] > 32) { inkTop = r; break outer; }
  const drift    = inkTop - Math.round((baselineY - ascent) * dpr);
  const finalY   = Math.abs(drift) > 1 ? baselineY - drift/dpr : baselineY;

  // Draw once to main canvas at corrected position
  ctx.font          = fontStr;
  ctx.letterSpacing = cs.letterSpacing || '0px';
  ctx.textBaseline  = 'alphabetic';
  ctx.fillStyle     = '#fff';
  ctx.fillText(word, baselineX, finalY);

  bfsAndPaint(cv, ctx, cv.width, cv.height, fill.stops);
}

function paintWordSpan(span, fill, fontStr, letterSpacing, dpr) {
  const word = span.dataset.cfWord;
  if (!word) return;

  let cv = span.querySelector(':scope > canvas.cf-canvas');
  if (!cv) {
    cv = document.createElement('canvas');
    cv.className = 'cf-canvas';
    cv.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:-1;';
    span.insertBefore(cv, span.firstChild);
  }

  const W = span.offsetWidth, H = span.offsetHeight;
  if (!W || !H) return;
  cv.width  = Math.round(W * dpr);
  cv.height = Math.round(H * dpr);

  const ctx = cv.getContext('2d', { willReadFrequently: true });
  ctx.scale(dpr, dpr);

  const sizer = document.createElement('span');
  sizer.style.cssText = 'display:inline-block;width:0;height:0;vertical-align:baseline;overflow:visible;';
  span.insertBefore(sizer, span.firstChild);
  const sR  = sizer.getBoundingClientRect();
  const spR = span.getBoundingClientRect();
  span.removeChild(sizer);

  const bx = sR.left   - spR.left;
  const by = sR.bottom - spR.top;

  ctx.font = fontStr; ctx.letterSpacing = letterSpacing;
  ctx.textBaseline = 'alphabetic'; ctx.fillStyle = '#fff';
  ctx.fillText(word, bx, by);

  bfsAndPaint(cv, ctx, cv.width, cv.height, fill.stops);
}

function paintMulti(wrap) {
  const fill = FILLS[wrap.id];
  if (!fill) return;

  const dpr = window.devicePixelRatio || 1;

  if (!wrap.querySelector(':scope > span.cf-word')) {
    const rawText = wrap.textContent.trim();
    wrap.innerHTML = '';
    rawText.split(/(\s+)/).forEach(part => {
      if (/^\s+$/.test(part)) {
        wrap.appendChild(document.createTextNode(part));
      } else if (part.length) {
        const s = document.createElement('span');
        s.className = 'cf-word';
        s.dataset.cfWord = part;
        s.textContent = part;
        wrap.appendChild(s);
      }
    });
  }

  const wordSpans = wrap.querySelectorAll(':scope > span.cf-word');
  if (!wordSpans.length) return;

  const cs = getComputedStyle(wrap);
  const fontStr = [
    cs.fontStyle !== 'normal' ? cs.fontStyle : '',
    cs.fontWeight, cs.fontSize, cs.fontFamily,
  ].filter(Boolean).join(' ');
  const letterSpacing = cs.letterSpacing || '0px';

  wordSpans.forEach(span => paintWordSpan(span, fill, fontStr, letterSpacing, dpr));
}

function runAll() {
  document.querySelectorAll('.wrap').forEach(paintWrap);
  document.querySelectorAll('.wrap-multi').forEach(paintMulti);
}

document.fonts.ready.then(runAll);

// ── Performance: debounced ResizeObserver + size cache ───────────────────────
// Cache stores last painted size per element. If size unchanged, skip repaint.
// Debounce ensures BFS only runs once after resize settles (not on every frame).
const sizeCache = new WeakMap();
let rafId = null;
const pending = new Set();

function scheduleRepaint(el) {
  const W = el.offsetWidth, H = el.offsetHeight;
  const dpr = window.devicePixelRatio || 1;
  const key = `${Math.round(W*dpr)}x${Math.round(H*dpr)}`;
  if (sizeCache.get(el) === key) return; // unchanged — skip
  pending.add(el);

  if (rafId) return; // already scheduled
  // Double rAF: first frame lets layout settle after resize,
  // second frame reads positions and paints.
  rafId = requestAnimationFrame(() => {
    rafId = requestAnimationFrame(() => {
      rafId = null;
      pending.forEach(target => {
        const W2 = target.offsetWidth, H2 = target.offsetHeight;
        const key2 = `${Math.round(W2*dpr)}x${Math.round(H2*dpr)}`;
        sizeCache.set(target, key2);
        target.classList.contains('wrap-multi') ? paintMulti(target) : paintWrap(target);
      });
      pending.clear();
    });
  });
}

const ro = new ResizeObserver(entries => {
  entries.forEach(e => scheduleRepaint(e.target));
});
document.querySelectorAll('.wrap, .wrap-multi').forEach(el => ro.observe(el));
</script>
</body>
</html>
